spring:
  application:
    name: skillnest

  profiles:
    active: prod  # Mặc định dùng production profile

  # Database Configuration - LOCAL DEVELOPMENT
  datasource:
    url: jdbc:postgresql://localhost:5432/skillnest_db?currentSchema=public&options=-c%20TimeZone=Asia/Ho_Chi_Minh
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true  # Dev thì hiển thị SQL
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

  # File Upload
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT Configuration
jwt:
  secret: skillnest-super-secret-key-for-jwt-token-generation-minimum-256-bits
  expiration: 86400000  # 24 hours

# Payment Configuration
payment:
  platform-fee-percent: 8
  bank:
    name: MB Bank
    account-number: 01280120048888
    account-name: Đồng Thành Minh Trí
    code: MB

# Server Configuration
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Logging
logging:
  level:
    com.exe202.skillnest: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

# Azure Storage (Dev - local testing)
azure:
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
    container-name: skillnest-files
    base-url: https://skillneststorage.blob.core.windows.net/skillnest-files
    qr-base-url: https://skillneststorage.blob.core.windows.net/qrcodes/
