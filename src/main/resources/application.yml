spring:
  application:
    name: skillnest

  # Database Configuration - PRODUCTION (Azure VM)
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://4.193.192.105:5432/skillnest_db?currentSchema=public&options=-c%20TimeZone=Asia/Ho_Chi_Minh}
    username: ${DATABASE_USERNAME:skillnest}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# Logging
logging:
  level:
    com.exe202.skillnest: INFO
    org.springframework.security: WARN

